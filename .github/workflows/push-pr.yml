on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "src/**"
  pull_request:
    branches:
      - main
      - "release/**"
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: print a welcome message
        run: echo "Welcome to our first Github Actions Workflow! "

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run tests
        run: npm test
